apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-web-app
  labels:
    app: go-web-app
spec:
  ingressClassName: nginx
  rules:
  - host: go-web-app.local
    http:
      paths:
      - path: /home
        pathType: Prefix
        backend:
          service:
            name: go-web-app
            port:
              number: 8080
